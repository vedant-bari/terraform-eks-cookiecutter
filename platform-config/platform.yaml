project:
  name: eks-platform
  environment: dev
  region: ap-south-1

backend:
  bucket: eks-platform-tfstate
  lock_table: terraform-locks

kms:
  enable_key_rotation: true
  deletion_window_in_days: 30

network:
  name: shared-vpc

  cidr: 10.0.0.0/16

  azs:
    - ap-south-1a
    - ap-south-1b
    - ap-south-1c

  public_subnets:
    - 10.0.101.0/24
    - 10.0.102.0/24
    - 10.0.103.0/24

  private_subnets:
    - 10.0.1.0/24
    - 10.0.2.0/24
    - 10.0.3.0/24

  enable_nat_gateway: true

  single_nat_gateway: false

  enable_flow_logs: true

  enable_vpc_endpoints: true